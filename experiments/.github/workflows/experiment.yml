name: "Experiment: ZeroShot vs MUI"

on:
  push:
    branches:
      - "experiment/**"
      - "copilot/**"
    paths:
      - "experiments/**"
  pull_request:
    paths:
      - "experiments/**"
  workflow_dispatch:
    inputs:
      assistant:
        description: "Assistant adapter to use (local or openai)"
        required: false
        default: "local"
        type: choice
        options:
          - local
          - openai
      task:
        description: "Task id to run (leave blank to run all)"
        required: false
        default: ""

jobs:
  pilot:
    name: "Pilot trial"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ------------------------------------------------------------------
      # 3. Setup Python
      # ------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------
      # 4. Install Python dependencies
      # ------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/requirements.txt

      # ------------------------------------------------------------------
      # 5. Bootstrap workspace (setup.sh)
      # ------------------------------------------------------------------
      - name: Bootstrap workspace
        run: |
          chmod +x experiments/setup.sh
          bash experiments/setup.sh

      # ------------------------------------------------------------------
      # 6. Configure API key (if available — masked automatically)
      # ------------------------------------------------------------------
      - name: Configure OPENAI_API_KEY
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      # ------------------------------------------------------------------
      # 7. Determine assistant mode
      # ------------------------------------------------------------------
      - name: Determine assistant mode
        id: mode
        run: |
          ASSISTANT="${{ github.event.inputs.assistant || 'local' }}"
          # If OPENAI_API_KEY is not set, force local mode
          if [[ "$ASSISTANT" == "openai" && -z "${OPENAI_API_KEY:-}" ]]; then
            echo "OPENAI_API_KEY not set — falling back to local adapter"
            ASSISTANT="local"
          fi
          echo "assistant=${ASSISTANT}" >> "$GITHUB_OUTPUT"
          echo "Using assistant: ${ASSISTANT}"

      # ------------------------------------------------------------------
      # 8. Place sample manual responses for local adapter pilot
      #    (These are committed example responses used when OPENAI_API_KEY
      #    is not available. They represent the expected correct fix.)
      # ------------------------------------------------------------------
      - name: Place sample manual responses
        if: steps.mode.outputs.assistant == 'local'
        run: |
          mkdir -p experiments/results/manual_responses/sample_task/project-zero
          mkdir -p experiments/results/manual_responses/sample_task/project-mui
          # Write a sample correct patch response for the formatDate task
          cat > experiments/results/manual_responses/sample_task/project-zero/response.txt << 'RESPONSE'
          ### FILE: src/utils/formatDate.ts
          /**
           * formatDate — formats an ISO date string as 'Mon DD, YYYY'.
           */
          export function formatDate(isoDate: string): string {
            const [year, month, day] = isoDate.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
              year: 'numeric',
            });
          }
          RESPONSE
          cp experiments/results/manual_responses/sample_task/project-zero/response.txt \
             experiments/results/manual_responses/sample_task/project-mui/response.txt

      # ------------------------------------------------------------------
      # 9. Run pilot trials
      # ------------------------------------------------------------------
      - name: Run pilot trials
        run: |
          ASSISTANT="${{ steps.mode.outputs.assistant }}"
          TASK_ARG=""
          if [[ -n "${{ github.event.inputs.task }}" ]]; then
            TASK_ARG="--task harness/${{ github.event.inputs.task }}"
          else
            TASK_ARG="--all-tasks"
          fi

          cd experiments
          python run_trial.py \
            --assistant "${ASSISTANT}" \
            ${TASK_ARG} \
            --all-variants

      # ------------------------------------------------------------------
      # 10. Run analysis
      # ------------------------------------------------------------------
      - name: Run analysis
        run: |
          cd experiments
          python analysis/aggregate.py || true  # non-fatal if no data

      # ------------------------------------------------------------------
      # 11. Upload results artifact
      # ------------------------------------------------------------------
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results-${{ github.run_id }}
          path: |
            experiments/results/trials.csv
            experiments/results/summary.json
            experiments/results/report.md
          retention-days: 30
